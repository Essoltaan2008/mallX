version: '3.9'

# ═══════════════════════════════════════════════════════
#  MallX — Production Docker Compose
#  يشمل: API + Frontend + Flutter Build + Redis + Nginx
# ═══════════════════════════════════════════════════════

services:

  # ─── PostgreSQL ───────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: mallx_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       mallxpro
      POSTGRES_USER:     mallx
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../database/phase1_mallx_migration.sql:/docker-entrypoint-initdb.d/01_phase1.sql
      - ../database/phase2/phase2_commission_payments.sql:/docker-entrypoint-initdb.d/02_phase2.sql
      - ../database/phase3/phase3_restaurant_booking_ratings.sql:/docker-entrypoint-initdb.d/03_phase3.sql
      - ../database/phase4/phase4_loyalty_promotions_push.sql:/docker-entrypoint-initdb.d/04_phase4.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mallx -d mallxpro"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mallx_net

  # ─── Redis ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: mallx_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --appendonly no
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - mallx_net

  # ─── ASP.NET Core API ─────────────────────────────────
  api:
    build:
      context: ../backend
      dockerfile: src/MesterX.API/Dockerfile
      args:
        BUILD_CONFIGURATION: Release
    image: mallx_api:latest
    container_name: mallx_api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS:        "http://+:5000"

      # Database
      ConnectionStrings__DefaultConnection: >-
        Host=db;Port=5432;Database=mallxpro;
        Username=mallx;Password=${DB_PASSWORD};
        Pooling=true;MaxPoolSize=50;

      # Redis
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD},abortConnect=false"

      # JWT
      Jwt__Secret:                  ${JWT_SECRET}
      Jwt__Issuer:                  mallxpro
      Jwt__Audience:                mallxpro-client
      Jwt__ExpiryMinutes:           "60"
      Jwt__CustomerExpiryMinutes:   "60"

      # CORS
      AllowedOrigins__0:            "http://localhost:3000"
      AllowedOrigins__1:            ${FRONTEND_URL}

      # Firebase FCM
      Firebase__ServerKey:          ${FIREBASE_SERVER_KEY}

      # Paymob
      Paymob__ApiKey:               ${PAYMOB_API_KEY}
      Paymob__IntegrationId:        ${PAYMOB_INTEGRATION_ID}
      Paymob__IframeId:             ${PAYMOB_IFRAME_ID}
      Paymob__HmacSecret:           ${PAYMOB_HMAC_SECRET}

    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - api_logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - mallx_net
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

  # ─── Next.js Frontend (Admin + Store Dashboard) ───────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL:      http://localhost:5000/api
        NEXT_PUBLIC_SIGNALR_URL:  http://localhost:5000
    image: mallx_frontend:latest
    container_name: mallx_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL:      http://api:5000/api
      NEXT_PUBLIC_SIGNALR_URL:  http://api:5000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - mallx_net
    deploy:
      resources:
        limits:
          memory: 512M

  # ─── Nginx Reverse Proxy ──────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: mallx_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
      - frontend
    networks:
      - mallx_net

# ─── VOLUMES ──────────────────────────────────────────
volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  api_logs:
    driver: local
  nginx_logs:
    driver: local

# ─── NETWORK ──────────────────────────────────────────
networks:
  mallx_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
