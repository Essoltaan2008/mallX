version: '3.9'

# ═══════════════════════════════════════════════════════════════════════════
#  MallX Production Docker Compose
#  Built on MesterXPro — Phase 5 Final
# ═══════════════════════════════════════════════════════════════════════════

services:

  # ─── PostgreSQL ──────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: mallx_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       mallxpro
      POSTGRES_USER:     mallx
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Run migration scripts in order
      - ../database/phase1_mallx_migration.sql:/docker-entrypoint-initdb.d/01_phase1.sql
      - ../database/phase2/phase2_commission_payments.sql:/docker-entrypoint-initdb.d/02_phase2.sql
      - ../database/phase3/phase3_restaurant_booking_ratings.sql:/docker-entrypoint-initdb.d/03_phase3.sql
      - ../database/phase4/phase4_loyalty_promotions_push.sql:/docker-entrypoint-initdb.d/04_phase4.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mallx -d mallxpro"]
      interval: 10s
      timeout:  5s
      retries:  5
    networks:
      - mallx_net

  # ─── Redis ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: mallx_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout:  3s
      retries:  5
    networks:
      - mallx_net

  # ─── API (ASP.NET Core) ──────────────────────────────────────────────────
  api:
    build:
      context: ../backend
      dockerfile: src/MesterX.API/Dockerfile
      target: final
    container_name: mallx_api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT:   Production
      ASPNETCORE_URLS:          http://+:5000
      ConnectionStrings__DefaultConnection: >
        Host=db;Port=5432;Database=mallxpro;
        Username=mallx;Password=${DB_PASSWORD};
        Pooling=true;MinPoolSize=2;MaxPoolSize=20;
        CommandTimeout=30
      Redis__ConnectionString:  redis:6379
      Redis__Password:          ${REDIS_PASSWORD}
      Jwt__Secret:              ${JWT_SECRET}
      Jwt__Issuer:              mallxpro
      Jwt__Audience:            mallxpro-client
      Jwt__ExpiryMinutes:       "60"
      Jwt__CustomerExpiryMinutes: "60"
      AllowedOrigins__0:        ${FRONTEND_URL:-http://localhost:3000}
      AllowedOrigins__1:        ${MOBILE_URL:-http://localhost:8081}
      Paymob__ApiKey:           ${PAYMOB_API_KEY}
      Paymob__IntegrationId:    ${PAYMOB_INTEGRATION_ID}
      Paymob__IframeId:         ${PAYMOB_IFRAME_ID}
      Paymob__HmacSecret:       ${PAYMOB_HMAC_SECRET}
      Firebase__ServerKey:      ${FIREBASE_SERVER_KEY}
      Serilog__MinimumLevel:    Information
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - api_logs:/app/logs
    ports:
      - "5000:5000"
    networks:
      - mallx_net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus:   '1'

  # ─── Frontend (Next.js) ──────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: mallx_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL:     http://localhost:5000/api
      NEXT_PUBLIC_SIGNALR_URL: http://localhost:5000
    depends_on:
      - api
    ports:
      - "3000:3000"
    networks:
      - mallx_net
    deploy:
      resources:
        limits:
          memory: 256M

  # ─── Nginx Reverse Proxy ─────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: mallx_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro              # mount SSL certs
      - nginx_cache:/var/cache/nginx
    depends_on:
      - api
      - frontend
    networks:
      - mallx_net

# ─── Networks ────────────────────────────────────────────────────────────
networks:
  mallx_net:
    driver: bridge

# ─── Volumes ─────────────────────────────────────────────────────────────
volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  api_logs:
    driver: local
  nginx_cache:
    driver: local
